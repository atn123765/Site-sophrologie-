<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<title>Sophrologie</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#f5f1e8;
  font-family:Arial, sans-serif;
}

/* HERO */
.hero{
  position:relative;
  min-height:100vh;
  padding:30px;
  overflow:hidden;
  background:linear-gradient(135deg,#f7f3eb,#ece6db);
  display:flex;
  flex-direction:column;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 28px;
  border-radius:999px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.4);
}

/* LOGO */
.logo{
  font-family:'Cormorant Garamond', serif;
  font-size:1.6rem;
}

.logo span{
  display:block;
  font-size:0.7rem;
  letter-spacing:3px;
}

/* HERO CONTENT */
.hero-content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TITLE */
.hero h1{
  font-size:4rem;
}

.hero h1 span{
  color:#ba8666;
  font-style:italic;
  font-family:'Cormorant Garamond', serif;
}

/* FADE IN */
.fade-in{
  opacity:0;
  transform:translateY(40px);
  transition:0.8s ease;
}

.fade-in.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:900px){
  .hero h1{
    font-size:2.5rem;
  }

  .navbar{
    flex-direction:column;
    gap:10px;
  }
}

</style>

</head>

<body>

<section class="hero">

  <nav class="navbar">
    <div class="logo">
      SYLVIE PONS
      <span>SOPHROLOGIE</span>
    </div>

    <div>
      Accueil | À propos | Séances | Contact
    </div>
  </nav>

  <div class="hero-content fade-in">

    <h1>
      Découvrez<br>
      <span>la sophrologie</span>
    </h1>

    <p>
      La sophrologie aide à réduire le stress et améliorer le bien-être.
    </p>

  </div>

</section>

<script>
const elements = document.querySelectorAll('.fade-in');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
