<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f5f1e8;
  scroll-behavior:smooth;
}

/* FOND GLOBAL */
.background{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#f7f3eb,#ece6db);
  z-index:-10;
}

/* BLOBS */
.blur{
  position:fixed;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.6;
  z-index:-5;
}

.blur1{
  width:400px;
  height:400px;
  background:#c7d5bf;
  top:-120px;
  right:-100px;
}

.blur2{
  width:300px;
  height:300px;
  background:#d7b79f;
  bottom:-100px;
  left:-80px;
}

/* NAVBAR FIXE */
.navbar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:1100px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:18px 28px;

  border-radius:999px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 10px 35px rgba(0,0,0,0.06);

  z-index:1000;
}

.logo{
  font-family:'Cormorant Garamond', serif;
  font-size:1.6rem;
}

.logo span{
  display:block;
  font-size:0.75rem;
  opacity:0.7;
}

/* LINKS */
.nav-links a{
  margin:0 12px;
  text-decoration:none;
  color:#555;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:120px;
}

.hero h1{
  font-size:4rem;
  font-weight:300;
}

.hero h1 span{
  color:#ba8666;
  font-style:italic;
}

/* SECTIONS (IMPORTANT = style identique partout) */
.section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:80px;
}

.card{
  max-width:700px;
  padding:40px;

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(18px);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);

  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* NAV SMOOTH */
html{
  scroll-behavior:smooth;
}

</style>
</head>

<body>

<div class="background"></div>
<div class="blur blur1"></div>
<div class="blur blur2"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    SYLVIE PONS
    <span>SOPHROLOGIE</span>
  </div>

  <div class="nav-links">
    <a href="#accueil">Accueil</a>
    <a href="#apropos">À propos</a>
    <a href="#seances">Séances</a>
    <a href="#contact">Contact</a>
  </div>

  <button>Réserver</button>
</div>

<!-- HERO -->
<section class="hero" id="accueil">
  <div>
    <h1>Découvrez <br><span>la sophrologie</span></h1>
    <p>Retrouvez calme, équilibre et confiance.</p>
  </div>
</section>

<!-- À PROPOS -->
<section class="section" id="apropos">
  <div class="card">
    <h2>À propos</h2>
    <p>La sophrologie est une méthode douce...</p>
  </div>
</section>

<!-- SÉANCES -->
<section class="section" id="seances">
  <div class="card">
    <h2>Séances</h2>
    <p>Accompagnement individuel et collectif...</p>
  </div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
  <div class="card">
    <h2>Contact</h2>
    <p>Réservation et informations...</p>
  </div>
</section>

</body>
</html>
