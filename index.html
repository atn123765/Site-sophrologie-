<!DOCTYPE html>
<html lang="fr">

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#f5f1e8;
  font-family:Arial, sans-serif;
}

/* HERO */

.hero{
  position:relative;
  min-height:100vh;
  overflow:hidden;
  padding:30px;
  background:linear-gradient(135deg,#f7f3eb,#ece6db);
  display:flex;
  flex-direction:column;
}

/* BLOBS */

.blur{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.6;
}

.blur1{
  width:400px;
  height:400px;
  background:#c7d5bf;
  top:-120px;
  right:-100px;
}

.blur2{
  width:300px;
  height:300px;
  background:#d7b79f;
  bottom:-100px;
  left:-80px;
}

/* NAVBAR */

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 28px;
  border-radius:999px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,0.4);
}

/* LOGO */

.logo{
  font-family:'Cormorant Garamond', serif;
  font-size:1.8rem;
}

.logo span{
  display:block;
  font-size:0.8rem;
  opacity:0.7;
}

/* HERO CONTENT */

.hero-content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TITLE */

.hero h1{
  font-size:5rem;
  font-weight:300;
}

.hero h1 span{
  color:#ba8666;
  font-style:italic;
}

/* FADE IN */

.fade-in{
  opacity:0;
  transform:translateY(40px);
  transition:0.8s ease;
}

.fade-in.show{
  opacity:1;
  transform:translateY(0);
}

</style>

</head>

<body>

<section class="hero">

  <nav class="navbar fade-in">

    <div class="logo">
      SYLVIE PONS
      <span>SOPHROLOGIE</span>
    </div>

    <div class="nav-links">
      <a href="#">Accueil</a>
      <a href="#">À propos</a>
      <a href="#">Séances</a>
      <a href="#">Contact</a>
    </div>

    <button class="nav-btn">Réserver</button>

  </nav>

  <div class="hero-content fade-in">

    <h1>
      Découvrez <br>
      <span>la sophrologie</span>
    </h1>

    <p>
      La sophrologie vous accompagne à mieux gérer le stress,
      améliorer votre sommeil et renforcer votre bien-être.
    </p>

  </div>

  <div class="blur blur1"></div>
  <div class="blur blur2"></div>

</section>

<!-- JS ICI (IMPORTANT) -->

<script>
const elements = document.querySelectorAll('.fade-in');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
