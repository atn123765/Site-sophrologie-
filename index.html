<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f5f1e8;
  scroll-behavior:smooth;
}

/* FOND GLOBAL (même partout) */
.hero{
  position:relative;
  min-height:100vh;
  overflow:hidden;
  padding:30px;
  background:linear-gradient(135deg,#f7f3eb,#ece6db);
}

/* BLOBS */
.blur{
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.6;
  z-index:0;
}

.blur1{
  width:400px;
  height:400px;
  background:#c7d5bf;
  top:-120px;
  right:-100px;
}

.blur2{
  width:300px;
  height:300px;
  background:#d7b79f;
  bottom:-100px;
  left:-80px;
}

/* NAVBAR FIXE */
.navbar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:1100px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:18px 28px;

  border-radius:999px;
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.4);
  box-shadow:0 10px 35px rgba(0,0,0,0.06);

  z-index:1000;
}

.logo{
  font-family:'Cormorant Garamond', serif;
  font-size:1.6rem;
  font-weight:500;
}

.logo span{
  display:block;
  font-size:0.75rem;
  opacity:0.7;
  letter-spacing:3px;
}

/* NAV LINKS */
.nav-links{
  display:flex;
  gap:25px;
}

.nav-links a{
  text-decoration:none;
  color:#555;
  font-size:0.95rem;
}

/* BUTTON */
.nav-btn{
  border:none;
  padding:10px 20px;
  border-radius:999px;
  background:#222;
  color:white;
  cursor:pointer;
}

/* HERO CONTENT */
.hero-content{
  position:relative;
  z-index:2;
  height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:4.5rem;
  font-weight:300;
}

.hero h1 span{
  color:#ba8666;
  font-style:italic;
  font-family:'Cormorant Garamond', serif;
}

.hero p{
  margin-top:20px;
  color:#666;
  max-width:600px;
}

/* SECTIONS */
.section{
  min-height:100vh;
  padding:120px 40px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* FADE IN */
.fade-in{
  opacity:0;
  transform:translateY(40px);
  transition:0.8s ease;
}

.fade-in.show{
  opacity:1;
  transform:translateY(0);
}

/* MOBILE */
@media(max-width:900px){
  .hero h1{
    font-size:3rem;
  }

  .nav-links{
    display:none;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    SYLVIE PONS
    <span>SOPHROLOGIE</span>
  </div>

  <div class="nav-links">
    <a href="#accueil">Accueil</a>
    <a href="#apropos">À propos</a>
    <a href="#seances">Séances</a>
    <a href="#contact">Contact</a>
  </div>

  <button class="nav-btn">Réserver</button>
</div>

<!-- HERO -->
<section class="hero" id="accueil">

  <div class="hero-content fade-in">
    <h1>Découvrez <br><span>la sophrologie</span></h1>
    <p>Un accompagnement moderne pour retrouver calme, équilibre et confiance.</p>
  </div>

  <div class="blur blur1"></div>
  <div class="blur blur2"></div>

</section>

<!-- SECTIONS -->
<section class="section fade-in" id="apropos">
  À propos de la sophrologie
</section>

<section class="section fade-in" id="seances">
  Séances et accompagnement
</section>

<section class="section fade-in" id="contact">
  Contact et réservation
</section>

<script>
const elements = document.querySelectorAll('.fade-in');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
